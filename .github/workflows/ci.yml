# CI for card-eval — runs on every push and pull request.
#
# Runs entirely in MOCK mode (no API key, free, deterministic), so the build
# is fast and never flaky. It proves the pipeline works end to end:
#   1. the Playwright e2e test renders a card and runs it through the eval
#   2. run_eval.py produces a fresh run
#   3. compare.py fails the build (exit 1) if any card regressed vs baseline
#
# Real-mode evals (actual LLM scoring) are intentionally NOT run here — they
# cost money, vary run to run, and need a secret. Those belong in a scheduled
# job, not on every push.

name: CI

on:
  push:
  pull_request:

jobs:
  eval:
    runs-on: ubuntu-latest

    # Force mock mode regardless of any other config. No network, no key.
    env:
      MOCK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Install Playwright browser (chromium)
        run: python -m playwright install --with-deps chromium

      - name: Run e2e + eval tests (mock)
        run: pytest e2e/ -v

      # The committed results/baseline.json is a REAL-LLM baseline (cards = 5.0).
      # Mock mode scores differently, so comparing a mock run to a real baseline
      # would always "regress". For CI we generate a fresh MOCK baseline and
      # compare a MOCK run against it — apples to apples. The committed real
      # baseline on disk is left untouched (this overwrite is CI-only, ephemeral).
      - name: Create a mock baseline for CI
        run: python run_eval.py --baseline

      - name: Produce an eval run (mock)
        run: python run_eval.py

      - name: Regression gate vs baseline
        run: python compare.py
